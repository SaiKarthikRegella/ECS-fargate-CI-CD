name: CI/CD — ECS Fargate

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  ci-cd:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run pytest
        run: pytest -v

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-2

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: flask
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build --platform linux/amd64 \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "Pushed: $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
            image-ref: ${{ steps.login-ecr.outputs.registry }}/flask:${{ github.sha }}
            format: table
            exit-code: '1'
            ignore-unfixed: true
            severity: CRITICAL

      - name: Update ECS task definition and deploy
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # Get current task definition
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition flask-api \
            --region us-east-2 \
            --query 'taskDefinition' \
            --output json)

          # Update image and strip read-only fields
          NEW_TASK_DEF=$(echo $TASK_DEF | python3 -c "
          import json, sys
          td = json.load(sys.stdin)
          td['containerDefinitions'][0]['image'] = '$ECR_REGISTRY/flask:$IMAGE_TAG'
          for key in ['taskDefinitionArn','revision','status','requiresAttributes',
                      'compatibilities','registeredAt','registeredBy']:
              td.pop(key, None)
          print(json.dumps(td))
          ")

          # Register new task definition revision
          NEW_REVISION=$(aws ecs register-task-definition \
            --region us-east-2 \
            --cli-input-json "$NEW_TASK_DEF" \
            --query 'taskDefinition.revision' \
            --output text)

          echo "New task definition revision: $NEW_REVISION"

          # Update service with new revision
          aws ecs update-service \
            --cluster Flask_application \
            --service flask-api-service-0o12uaja \
            --task-definition flask-api:$NEW_REVISION \
            --force-new-deployment \
            --region us-east-2

          echo "Deployment triggered with revision: $NEW_REVISION"

          echo "Waiting for service to stabilise..."
          aws ecs wait services-stable \
            --cluster Flask_application \
            --services flask-api-service-0o12uaja \
            --region us-east-2

          echo "Deployment verified — service is stable."